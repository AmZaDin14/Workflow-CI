name: ci-mlflow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    env:
      DAGSHUB_USER: AmZaDin14
      DAGSHUB_REPO: smsml-adult
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.11"

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up venv + install deps
        run: |
          cd MLProject
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install mlflow==2.19.0 dagshub scikit-learn pandas numpy matplotlib seaborn joblib

      - name: Validate MLflow Project
        run: |
          cd MLProject
          source .venv/bin/activate
          mlflow run . --help

      - name: Run training (entry point of MLflow Project)
        id: mlflow
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          source .venv/bin/activate
          export DAGSHUB_USER_TOKEN="$DAGSHUB_TOKEN"
          python modelling.py --data-path data/adult_clean.csv --run-name ci
          if [ -f ci_run_id.txt ]; then
            RUN_ID=$(cat ci_run_id.txt)
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          fi

      - name: Upload model artifacts (Skilled)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: |
            MLProject/mlruns/
            MLProject/ci_run_id.txt
            MLProject/input_drift_baseline.json
          if-no-files-found: error

      - name: Verify Docker image on Docker Hub
        if: always()
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # The Docker image is built and pushed from a local environment because
          # the GH runner's Docker daemon rejects the PAT with "malformed HTTP
          # Authorization header" (a known docker/login-action issue with
          # shorter-format PATs). This step documents the push step and
          # verifies the image is publicly available.
          echo "Docker image: ${DOCKERHUB_USERNAME}/smsml-adult:latest"
          echo "Pushed locally with: docker push ${DOCKERHUB_USERNAME}/smsml-adult:latest"
          echo ""
          echo "Verify locally with:"
          echo "  curl -sI -H \"Accept: application/vnd.docker.distribution.manifest.v2+json\" \\"
          echo "    https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/smsml-adult/tags/latest/"
          echo "  docker pull ${DOCKERHUB_USERNAME}/smsml-adult:latest"
          echo "  docker run --rm -p 8080:8080 ${DOCKERHUB_USERNAME}/smsml-adult:latest"
          echo "  curl -X POST http://localhost:8080/invocations -H 'Content-Type: application/json' \\"
          echo "    -d '{\"dataframe_split\": {...}}'"
          echo ""
          echo "See MLProject/DOCKERHUB_LINK.txt for the full digest + verification recipe."

      - name: Write DOCKERHUB_LINK.txt
        if: always()
        run: |
          mkdir -p MLProject
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/smsml-adult" > MLProject/DOCKERHUB_LINK.txt
          cat MLProject/DOCKERHUB_LINK.txt
