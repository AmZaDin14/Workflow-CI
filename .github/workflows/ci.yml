name: ci-mlflow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    env:
      DAGSHUB_USER: AmZaDin14
      DAGSHUB_REPO: smsml-adult
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.11"

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up venv + install deps
        run: |
          cd MLProject
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install mlflow==2.19.0 dagshub scikit-learn pandas numpy matplotlib seaborn joblib

      - name: Validate MLflow Project
        run: |
          cd MLProject
          source .venv/bin/activate
          mlflow run . --help

      - name: Run training (entry point of MLflow Project)
        id: mlflow
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          source .venv/bin/activate
          export DAGSHUB_USER_TOKEN="$DAGSHUB_TOKEN"
          python modelling.py --data-path data/adult_clean.csv --run-name ci
          if [ -f ci_run_id.txt ]; then
            RUN_ID=$(cat ci_run_id.txt)
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          fi

      - name: Upload model artifacts (Skilled)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: |
            MLProject/mlruns/
            MLProject/ci_run_id.txt
            MLProject/input_drift_baseline.json
          if-no-files-found: error

      - name: Login to Docker Hub
        if: steps.mlflow.outputs.run_id
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Trim any trailing whitespace/newline that GH secrets may include
          TOKEN=$(printf '%s' "$DOCKERHUB_TOKEN" | tr -d '\r\n ')
          echo "Token length: ${#TOKEN}"
          echo "$TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build & push Docker image (Advance)
        if: steps.mlflow.outputs.run_id
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          source .venv/bin/activate
          export DAGSHUB_USER_TOKEN="$DAGSHUB_TOKEN"
          RUN_ID="${{ steps.mlflow.outputs.run_id }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/smsml-adult"
          echo "Building Docker image for run $RUN_ID -> $IMAGE:latest"
          mlflow models build-docker --model-uri "runs:/${RUN_ID}/model" -n "${IMAGE}" || \
            echo "::warning::build-docker failed (likely the truncated Docker token); the workflow continues"
          docker push "${IMAGE}:latest" || echo "::warning::docker push failed"

      - name: Write DOCKERHUB_LINK.txt
        if: always()
        run: |
          mkdir -p MLProject
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/smsml-adult" > MLProject/DOCKERHUB_LINK.txt
          cat MLProject/DOCKERHUB_LINK.txt
