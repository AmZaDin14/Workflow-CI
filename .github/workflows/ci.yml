name: ci-mlflow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    env:
      DAGSHUB_USER: AmZaDin14
      DAGSHUB_REPO: smsml-adult
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.11"

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up venv + install deps
        run: |
          cd MLProject
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install mlflow==2.19.0 dagshub scikit-learn pandas numpy matplotlib seaborn joblib

      - name: Validate MLflow Project
        run: |
          cd MLProject
          source .venv/bin/activate
          mlflow run . --help

      - name: Run training (entry point of MLflow Project)
        id: mlflow
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          source .venv/bin/activate
          export DAGSHUB_USER_TOKEN="$DAGSHUB_TOKEN"
          python modelling.py --data-path data/adult_clean.csv --run-name ci
          if [ -f ci_run_id.txt ]; then
            RUN_ID=$(cat ci_run_id.txt)
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          fi

      - name: Upload model artifacts (Skilled)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: |
            MLProject/mlruns/
            MLProject/ci_run_id.txt
            MLProject/input_drift_baseline.json
          if-no-files-found: error

      - name: Verify Docker image on Docker Hub
        if: always()
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # The Docker image is built and pushed from a local environment (the
          # GH runner's Docker daemon rejects our PAT with "malformed HTTP
          # Authorization header"). This step verifies the image is publicly
          # available on Docker Hub by fetching the manifest with an
          # anonymous bearer token from auth.docker.io.
          echo "Verifying amzadin14/smsml-adult:latest on Docker Hub..."
          TOKEN=$(curl -sf "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${DOCKERHUB_USERNAME}/smsml-adult:pull" \
            | python -c "import json,sys; print(json.load(sys.stdin)['token'])" || echo "")
          if [ -z "$TOKEN" ]; then
            echo "::warning::could not get auth.docker.io token"
            exit 0
          fi
          HEADERS=$(curl -sI -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://registry-1.docker.io/v2/${DOCKERHUB_USERNAME}/smsml-adult/manifests/latest")
          echo "$HEADERS" | head -10
          if echo "$HEADERS" | grep -q "HTTP/2 200"; then
            DIGEST=$(echo "$HEADERS" | grep -i 'docker-content-digest' | awk '{print $2}' | tr -d '\r')
            echo "  ✓ image is on Docker Hub (digest: $DIGEST)"
            echo "DIGEST=$DIGEST" >> $GITHUB_OUTPUT
          else
            echo "::warning::image not found on Docker Hub (may need to push first)"
          fi

      - name: Write DOCKERHUB_LINK.txt
        if: always()
        run: |
          mkdir -p MLProject
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/smsml-adult" > MLProject/DOCKERHUB_LINK.txt
          cat MLProject/DOCKERHUB_LINK.txt
